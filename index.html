<!doctype html>
<html>
<head>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TopStreaming</title>

  <style>
    :root{
      --bg:#0b0f17;
      --card:#121a26;
      --card2:#0f1624;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --border: rgba(148,163,184,.15);

      --accent:#38bdf8;   /* precio */
      --ok:#22c55e;       /* stock */
      --bad:#ef4444;      /* agotado */
    }

    *{ box-sizing:border-box; }
    body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu;
  color:var(--text);
  background:
    radial-gradient(900px 520px at 14% 10%, rgba(34,197,94,.20), transparent 60%),
    radial-gradient(900px 520px at 86% 18%, rgba(56,189,248,.18), transparent 60%),
    linear-gradient(180deg, #050812, var(--bg));
}


    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:26px 16px 64px;
    }

    header{
      display:flex;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:16px;
    }

    .brand h1{
      margin:0;
      font-size:22px;
      letter-spacing:.2px;
    }
    .brand .sub{
      margin-top:6px;
      font-size:13px;
      color:var(--muted);
    }

    .tools{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    input[type="search"]{
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding:10px 12px;
      border-radius: 12px;
      outline: none;
      min-width: 260px;
    }

    .btn{
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding:10px 12px;
      border-radius: 12px;
      cursor:pointer;
      transition: border-color .15s ease, transform .05s ease;
    }
    .btn:hover{ border-color: rgba(56,189,248,.5); }
    .btn:active{ transform: translateY(1px); }

    /* ✅ Portal Clientes */
    .btn-portal{
      background: linear-gradient(90deg, rgba(34,197,94,.22), rgba(56,189,248,.12));
      border-color: rgba(34,197,94,.35);
      font-weight: 800;
    }
    .btn-portal:hover{ border-color: rgba(34,197,94,.6); }

    .btn-wa{
  display:inline-flex;
  align-items:center;
  gap:8px;
  text-decoration:none;
  font-weight: 900;
  background: linear-gradient(90deg, rgba(34,197,94,.24), rgba(34,197,94,.10));
  border-color: rgba(34,197,94,.40);
}
.btn-wa:hover{
  border-color: rgba(34,197,94,.70);
}
.wa-dot{
  width:10px;height:10px;border-radius:999px;
  background: #22c55e;
  box-shadow: 0 0 0 3px rgba(34,197,94,.18);
}


    /* GRID (PC / tablet) */
    /* GRID FIJO */
.grid{
  display:grid;
  grid-template-columns: repeat(4, 1fr); /* PC 4 */
  gap:14px;
  margin-top:14px;
}
@media (max-width:980px){
  .grid{ grid-template-columns: repeat(3, 1fr); }
}
@media (max-width:720px){
  .grid{ grid-template-columns: repeat(2, 1fr); } /* Cel 2 */
}

    .card{
      background: rgba(18,26,38,.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .img{
  aspect-ratio: 16/10; /* si quieres cuadrado tipo marketplace, lo cambiamos luego a 1/1 */
  background:#0a1020;
  display:flex;
  align-items:center;
  justify-content:center;
  position: relative;   /* ✅ necesario para overlays */
  overflow: hidden;
}
/* Overlays dentro de la imagen */
.imgOverlayTop{
  position:absolute;
  top:10px;
  right:10px;
  display:flex;
  gap:8px;
  z-index:2;
}

.imgOverlayBottom{
  position:absolute;
  left:50%;
  bottom:10px;
  transform: translateX(-50%);
  z-index:2;
}
.imgOverlayBottom{
  max-width: 92%;
}
.imgOverlayBottom .badge{
  text-align:center;
}

/* Fondo suave para que se lea sobre imágenes claras */
.badge.overlay{
  backdrop-filter: blur(8px);
  background: rgba(10,14,25,.55);
  border-color: rgba(255,255,255,.18);
  color: rgba(255,255,255,.92);
}
.badge.overlay.ok{
  background: rgba(34,197,94,.16);
  border-color: rgba(34,197,94,.35);
}
.badge.overlay.bad{
  background: rgba(239,68,68,.16);
  border-color: rgba(239,68,68,.35);
}
.badge.overlay.tag{
  background: rgba(56,189,248,.14);
  border-color: rgba(56,189,248,.35);
}

    .img img{
  width:100%;
  height:100%;
  object-fit: contain;          /* ✅ NO RECORTA */
  object-position: center;
  display:block;
  transform: scale(0.98);       /* ✅ look premium (no pegado a borde) */
}


    .content{
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .name{
      font-weight: 800;
      font-size: 15px;
      line-height:1.2;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .price{
      font-weight: 900;
      font-size: 18px;
      color: var(--accent);
      letter-spacing:.2px;
    }

    .badge{
      font-size:12px;
      padding:6px 10px;
      border-radius: 999px;
      border:1px solid var(--border);
      color: var(--muted);
    }
    .badge.ok{
      color: #bbf7d0;
      border-color: rgba(34,197,94,.35);
      background: rgba(34,197,94,.08);
    }
    .badge.bad{
      color: #fecaca;
      border-color: rgba(239,68,68,.35);
      background: rgba(239,68,68,.08);
    }

    .actions{
  margin-top:auto;
  display:flex;
  gap:10px;
  justify-content: space-between; /* ✅ izquierda/derecha */
  align-items:center;
}


    .btn-primary{
      background: linear-gradient(90deg, rgba(56,189,248,.18), rgba(56,189,248,.08));
      border-color: rgba(56,189,248,.35);
    }

    .status{
      font-size: 13px;
      color: var(--muted);
      margin-top:8px;
    }

    .btn-buy{
  background: linear-gradient(90deg, rgba(34,197,94,.28), rgba(34,197,94,.12));
  border: 1px solid rgba(34,197,94,.45);
  color: #eafff2;
  font-weight: 900;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 12px;
  border-radius: 12px;
}
.btn-buy:hover{
  border-color: rgba(34,197,94,.85);
}


    /* Modal */
    .overlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index: 50;
    }

    .modal{
      width: min(900px, 100%);
      background: rgba(18,26,38,.98);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      max-height: 92vh;
    }

    .modal-header{
      padding:14px 14px 10px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title{
      font-weight:900;
      font-size:16px;
      line-height:1.2;
    }

    .modal-body{
      padding:14px;
      overflow:auto;
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:14px;
    }

    @media (max-width:820px){
      .modal-body{
        display:flex;
        flex-direction:column;
      }
      .modal-img{ order:1; }
      .modal-side{ order:2; }
    }

    .modal-img{
      aspect-ratio: 16/10;
      background:#0a1020;
      border-radius: 14px;
      overflow:hidden;
      border: 1px solid var(--border);
    }
    .modal-img img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .desc{
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding:12px;
      background: rgba(15,22,36,.45);
    }

    .close{
      width:40px; height:40px;
      display:grid; place-items:center;
      border-radius:12px;
      background: var(--card2);
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
      font-weight: 800;
      cursor:pointer;
    }

    .modal-side{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .form-row{ display:flex; flex-direction:column; gap:6px; }
    label{ font-size:12px; color: var(--muted); }
    .field{
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      padding:10px 12px;
      border-radius: 12px;
      outline:none;
      width:100%;
    }
    textarea.field{ min-height: 86px; resize: vertical; }

    .form-actions{ display:flex; gap:10px; flex-wrap:wrap; }

    .note{
      font-size: 12px;
      color: var(--muted);
    }

    /* HERO SEARCH */
.hero{
  margin-top:14px;
  border-radius: 22px;
  padding: 18px 16px 16px;
  background:
    radial-gradient(900px 260px at 20% 0%, rgba(34,197,94,.22), transparent 60%),
    radial-gradient(900px 260px at 85% 10%, rgba(56,189,248,.18), transparent 60%),
    rgba(18,26,38,.55);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: 0 18px 55px rgba(0,0,0,.45);
}

.hero-title{
  margin:0 0 12px;
  font-size:22px;
  font-weight: 1000;
  letter-spacing:.2px;
  text-align:center;
}
.hero-title .brandAccent{
  color:#38bdf8;
  font-style: italic;
}

.hero-search{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.hero-search input[type="search"]{
  width: min(620px, 100%);
  background: rgba(8,14,32,.60);
  border: 1px solid rgba(255,255,255,.14);
  color: var(--text);
  padding:14px 14px;
  border-radius: 16px;
  outline:none;
  font-size:15px;
  transition: border-color .15s ease, box-shadow .15s ease;
}

.hero-search input[type="search"]:focus{
  border-color: rgba(34,197,94,.55);
  box-shadow: 0 0 0 4px rgba(34,197,94,.14), 0 0 30px rgba(56,189,248,.10);
}

/* Banner noticia */
.banner{
  margin-top:14px;
  border-radius: 18px;
  overflow:hidden;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(18,26,38,.35);
  display:none;
}
.banner img{
  width:100%;
  display:block;
  object-fit:cover;
}

/* Filtros iconos */
.filters{
  margin-top:14px;
  display:flex;
  align-items:center;
  gap:10px;
}
.filters-title{
  font-size:16px;
  font-weight:1000;
  letter-spacing:.2px;
  display:flex;
  align-items:center;
  gap:8px;
  white-space: nowrap;
}

.iconNav{
  width:44px;height:44px;
  border-radius:14px;
  display:grid;
  place-items:center;
  cursor:pointer;
  border:1px solid rgba(34,197,94,.45);
  background: linear-gradient(135deg, rgba(34,197,94,.24), rgba(56,189,248,.16));
  color: #e2e8f0;
  font-weight: 1000;
}
.iconNav:hover{ border-color: rgba(34,197,94,.85); }

.iconStrip{ flex:1; overflow:hidden; }

.iconRow{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 2px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.iconRow::-webkit-scrollbar{ display:none; }

.iconBtn{
  min-width:56px; width:56px; height:56px;
  border-radius:999px;
  border: 3px solid rgba(255,255,255,.92); /* borde blanco */
  background: rgba(0,0,0,.25);
  display:grid;
  place-items:center;
  cursor:pointer;
  flex: 0 0 auto;
  transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  box-shadow: 0 10px 22px rgba(0,0,0,.35); /* sombra premium */
}

.iconBtn img{
  width:100%;
  height:100%;
  border-radius:999px;
  object-fit:cover;
}

.iconBtn:hover{ transform: translateY(-1px); }

.iconBtn.active{
  border-color: rgba(34,197,94,.95);
  box-shadow: 0 0 0 4px rgba(34,197,94,.16), 0 0 32px rgba(56,189,248,.14);
}

/* Badge tag (Renovable / No renovable / texto libre) */
.badge.tag{
  color: rgba(226,232,240,.92);
  border-color: rgba(56,189,248,.25);
  background: rgba(56,189,248,.08);
}

/* Botón extra: Buscar película */
.btn-movie{
  background: linear-gradient(90deg, rgba(56,189,248,.22), rgba(34,197,94,.12));
  border: 1px solid rgba(56,189,248,.35);
  font-weight: 900;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.btn-movie:hover{ border-color: rgba(56,189,248,.70); }

<body>
  <div class="wrap">

  <div class="brand" style="display:flex; align-items:center; gap:10px;">

<div class="banner" id="bannerBox">

    <div class="status" id="status">Cargando…</div>

  <!-- Modal Detalles -->
  <div class="overlay" id="overlayDetalles" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="dtNombre">—</div>

  <!-- Modal Form Avisame -->
  <div class="overlay" id="overlayAvisame" role="dialog" aria-modal="true">
    <div class="modal" style="width:min(520px, 100%);">
      <div class="modal-header">
        <div>
          <div class="modal-title">📩 Avísame cuando haya stock</div>
          <div class="status" id="avServicio">Servicio: —</div>
        </div>
        <button class="close" id="btnCerrarAvisame" aria-label="Cerrar">✕</button>

      <div class="modal-body" style="grid-template-columns:1fr;">
        <div class="modal-side">
          <div class="form-row">

          </div>

            <button class="btn" id="btnCancelarAvisame">Cancelar</button>

          <div class="status" id="avStatus"></div>
        </div>

  <script>
    // ✅ TU WORKER
    const API_BASE = "https://chesttop-api.fam-premium2720.workers.dev";

    let servicios = [];
    let seleccionado = null;

    let meta = { logoUrl:"", bannerUrl:"", icons:[] };
    let activeFilter = ""; // filtro por icono (ej. "Netflix")

    const $ = (id) => document.getElementById(id);

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function toNumberStock(stock){
      const raw = String(stock ?? "").trim();
      if (raw === "") return 0;
      const n = Number(raw);
      return Number.isFinite(n) ? n : 0;
    }

    // ✅ Stock sin números
    function stockBadge(stock){
  const n = toNumberStock(stock);
  if (!n || n <= 0) return `<span class="badge bad">⛔ Agotado</span>`;
  if (n <= 10) return `<span class="badge ok">✅ Hay stock: ${n}</span>`;
  return `<span class="badge ok">✅ Hay stock</span>`;
}


    function priceText(p){
      const v = String(p ?? "").trim();
      return v ? `S/ ${escapeHtml(v)}` : "Consultar";
    }

function buildCardHTML(x, realIndex){
  const img = x.imagen
    ? `<img
         src="${escapeHtml(x.imagen).replace(/sz=w\\d+/,'sz=w400')}"
         alt="${escapeHtml(x.nombre)}"
         loading="lazy"
         decoding="async"
         fetchpriority="low"
       >`
    : `<div class="status">Sin imagen</div>`;

  const nStock = toNumberStock(x.stock);

  const buyBtn = (nStock > 0)
    ? `<a class="btn-buy" href="https://wa.link/firnrr" target="_blank" rel="noopener">🛒 Comprar</a>`
    : "";
  const tag = String(
  x.tag ?? x.renovable ?? x.estado ?? x.badge ?? x.F ?? x.colF ?? ""
).trim();


  const tagBadge = tag ? `<span class="badge overlay tag">${escapeHtml(tag)}</span>` : "";
  const stockOverlay = stockBadge(x.stock)
  .replace('badge ok','badge overlay ok')
  .replace('badge bad','badge overlay bad');


  return `
    <div class="card">
      <div class="img">
  ${img}
  ${tagBadge ? `<div class="imgOverlayTop">${tagBadge}</div>` : ``}
  <div class="imgOverlayBottom">${stockOverlay}</div>
</div>
      <div class="content">
        <div class="name">${escapeHtml(x.nombre || "Sin nombre")}</div>
        <div class="row">
  <div class="price">${priceText(x.precio)}</div>
</div>
        <div class="actions">
          <button class="btn btn-primary" onclick="openDetalles(${realIndex})">Ver detalles</button>
          ${buyBtn}
        </div>
      </div>
    </div>
  `;
}


    function getFiltered(){
  const q = $("q").value.trim().toLowerCase();
  const f = String(activeFilter || "").trim().toLowerCase();

  return servicios.filter(x => {
    const name = String(x.nombre || "").toLowerCase();
    const okQ = !q || name.includes(q);
    const okF = !f || name.includes(f);
    return okQ && okF;
  });
}


    function render(){
  const list = getFiltered();

  const q = $("q").value.trim();
  const hasFilter = !!activeFilter;
  const isMobile = window.matchMedia("(max-width:720px)").matches;

  let visible = list;
  if (!q && !hasFilter) {
    visible = list.slice(0, isMobile ? 6 : 12);
  }

  $("status").textContent = (!q && !hasFilter)
    ? `Mostrando ${visible.length} de ${servicios.length} servicios`
    : `Mostrando ${list.length} resultados`;

  $("grid").innerHTML = visible
  .map((x) => buildCardHTML(x, servicios.indexOf(x)))
  .join("");

}


    function openDetalles(index){
      seleccionado = servicios[index];
      if (!seleccionado) return;

      $("dtNombre").textContent = seleccionado.nombre || "—";
      $("dtPrecio").innerHTML = priceText(seleccionado.precio);
      $("dtStock").innerHTML = stockBadge(seleccionado.stock);
      $("dtDesc").textContent = seleccionado.descripcion || "—";

$("dtImgWrap").innerHTML = seleccionado.imagen
  ? `<img
       src="${escapeHtml(seleccionado.imagen).replace(/sz=w\d+/,'sz=w1200')}"
       alt="${escapeHtml(seleccionado.nombre)}"
       decoding="async"
       fetchpriority="high"
     >`
  : `<div class="status" style="padding:14px">Sin imagen</div>`;


      const n = toNumberStock(seleccionado.stock);
      $("zonaAgotado").style.display = (n <= 0) ? "block" : "none";

      $("overlayDetalles").style.display = "flex";
    }

    function closeDetalles(){
      $("overlayDetalles").style.display = "none";
    }

    function openAvisame(){
      if (!seleccionado) return;
      $("avServicio").textContent = `Servicio: ${seleccionado.nombre || "—"}`;
      $("avNombre").value = "";
      $("avCelular").value = "";
      $("avMensaje").value = "";
      $("avStatus").textContent = "";
      $("overlayAvisame").style.display = "flex";
    }

    function closeAvisame(){
      $("overlayAvisame").style.display = "none";
    }

    function enviarAvisame(){
      if (!seleccionado) return;

      const nombre = $("avNombre").value.trim();
      const celular = $("avCelular").value.trim();
      const mensaje = $("avMensaje").value.trim();

      if (!nombre){
        $("avStatus").textContent = "❌ El nombre es obligatorio.";
        return;
      }
      if (!celular){
        $("avStatus").textContent = "❌ El celular es obligatorio.";
        return;
      }

      $("avStatus").textContent = "Enviando…";

      fetch(`${API_BASE}/api/alerta-stock`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          servicio: seleccionado.nombre || "",
          celular,
          nombre,
          mensaje
        })
      })
      .then(r => r.json())
      .then((resp) => {
        if (!resp.ok) throw new Error(resp.error || "No ok");
        $("avStatus").textContent = "✅ Listo. Registramos tu solicitud.";
        setTimeout(() => {
          closeAvisame();
          closeDetalles();
        }, 800);
      })
      .catch(err => {
        $("avStatus").textContent = "❌ Error: " + (err?.message || err);
      });
    }

    function setLogo(url){
  const img = $("logoTop");
  const u = String(url || "").trim();
  if (!u) { img.style.display="none"; return; }
  img.src = u;
  img.style.display = "block";
}

function setBanner(url){
  const box = $("bannerBox");
  const img = $("bannerImg");
  const u = String(url || "").trim();
  if (!u) { box.style.display="none"; return; }
  img.src = u;
  box.style.display="block";
}

function renderIcons(icons){
  const row = $("iconRow");
  row.innerHTML = "";

  (Array.isArray(icons) ? icons : []).forEach((it) => {
    const name = String(it.name || "").trim();
    const icon = String(it.icon || "").trim();
    if (!name || !icon) return;

    const btn = document.createElement("button");
    btn.className = "iconBtn";
    btn.type = "button";
    btn.title = name;
    btn.innerHTML = `<img src="${escapeHtml(icon)}" alt="${escapeHtml(name)}">`;

    btn.addEventListener("click", () => {
      activeFilter = (activeFilter && activeFilter.toLowerCase() === name.toLowerCase()) ? "" : name;

      // marcar active
      document.querySelectorAll(".iconBtn").forEach(b => b.classList.remove("active"));
      if (activeFilter) btn.classList.add("active");

      render();
    });

    row.appendChild(btn);
  });
}

function scrollIcons(dir){
  $("iconRow").scrollBy({ left: dir * 260, behavior: "smooth" });
}

    
    // ✅ Carga catálogo desde Worker
    async function load(){
  $("status").textContent = "Cargando…";

  try{
    const res = await fetch(`${API_BASE}/api/catalogo`, { method: "GET" });
    const data = await res.json();

    if (!data.ok) throw new Error(data.error || "No ok");

    meta.logoUrl = data.logoUrl || "";
    meta.bannerUrl = data.bannerUrl || "";
    meta.icons = Array.isArray(data.icons) ? data.icons : [];

    servicios = Array.isArray(data.items) ? data.items : [];
    activeFilter = "";

    setLogo(meta.logoUrl);
    setBanner(meta.bannerUrl);
    renderIcons(meta.icons);

    render();
  }catch(err){
    $("status").textContent = "Error cargando catálogo: " + (err?.message || err);
  }
}


    // Eventos
    $("btnPortal").addEventListener("click", () => {
  window.location.href = "portal.html";
});

$("q").addEventListener("input", () => {
  // Si el usuario escribe, apagamos el filtro de icono
  if (activeFilter) {
    activeFilter = "";
    document.querySelectorAll(".iconBtn").forEach(b => b.classList.remove("active"));
  }
  render();
});


$("btnReload").addEventListener("click", load);

$("iconPrev").addEventListener("click", () => scrollIcons(-1));
$("iconNext").addEventListener("click", () => scrollIcons(1));


    $("btnCerrarDetalles").addEventListener("click", closeDetalles);
    $("overlayDetalles").addEventListener("click", (e) => {
      if (e.target === $("overlayDetalles")) closeDetalles();
    });

    $("btnAvisame").addEventListener("click", openAvisame);

    $("btnCerrarAvisame").addEventListener("click", closeAvisame);
    $("btnCancelarAvisame").addEventListener("click", closeAvisame);
    $("btnEnviarAvisame").addEventListener("click", enviarAvisame);

    $("overlayAvisame").addEventListener("click", (e) => {
      if (e.target === $("overlayAvisame")) closeAvisame();
    });

    
    load();
  </script>
</body>
